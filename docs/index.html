<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Iniciativas</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#7C3AED">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Iniciativas">
<style>
  :root {
    --bg: #F7F6F3; --surface: #FFFFFF; --border: #E2DFD8; --border-strong: #C8C4BB;
    --text: #1A1916; --text-secondary: #6B6860; --text-tertiary: #A09C94;
    --accent: #2D5BE3; --accent-light: #EEF2FD;
    --font: 'Inter', system-ui, sans-serif; --mono: 'JetBrains Mono', 'Fira Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }

  #auth-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 1.5rem;
  }
  .auth-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 2.5rem 2rem; text-align: center; max-width: 360px; width: 100%;
  }
  .auth-logo { width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 1rem; display: block; }
  .auth-title { font-size: 20px; font-weight: 600; margin-bottom: .5rem; letter-spacing: -.02em; }
  .auth-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 1.5rem; }
  .auth-field { display: flex; flex-direction: column; gap: 4px; text-align: left; margin-bottom: 10px; }
  .auth-field label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  .auth-field input {
    font-size: 14px; font-family: var(--font); border: 1px solid var(--border-strong);
    border-radius: 6px; padding: 8px 10px; background: var(--bg); color: var(--text); outline: none; width: 100%;
  }
  .auth-field input:focus { border-color: var(--accent); }
  .btn-login {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; font-size: 14px; font-family: var(--font); cursor: pointer;
    width: 100%; margin-top: 4px; transition: opacity .15s;
  }
  .btn-login:hover { opacity: .88; }
  .btn-login:disabled { opacity: .55; cursor: not-allowed; }
  .auth-error { font-size: 12px; color: #991B1B; background: #FEE2E2; border-radius: 6px; padding: 7px 10px; margin-top: 8px; display: none; }

  #app-screen { display: none; }
  .layout { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .header { margin-bottom: 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .header-left h1 { font-size: 20px; font-weight: 600; letter-spacing: -.02em; }
  .header-left p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .user-chip { font-size: 12px; color: var(--text-secondary); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; }
  .btn-signout { font-size: 12px; color: var(--text-tertiary); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: var(--font); }
  .btn-signout:hover { border-color: var(--border-strong); color: var(--text); }

  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-tertiary); margin-bottom: .75rem; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .project-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 1.25rem 1.25rem 1rem; cursor: pointer; transition: border-color .15s, box-shadow .15s;
    display: flex; flex-direction: column; gap: 6px;
  }
  .project-card:hover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .pc-name { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .pc-meta { font-size: 12px; color: var(--text-tertiary); font-family: var(--mono); }
  .pc-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .pc-open { font-size: 11px; color: var(--accent); font-weight: 500; }

  .new-project-card {
    background: none; border: 1px dashed var(--border-strong); border-radius: 10px;
    padding: 1.25rem; cursor: pointer; color: var(--text-secondary); font-size: 14px;
    font-family: var(--font); text-align: left; transition: border-color .15s, color .15s;
    display: flex; align-items: center; gap: 10px;
  }
  .new-project-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .inline-form { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
  .form-row { display: flex; gap: 8px; }
  .form-row input { flex: 1; font-size: 14px; font-family: var(--font); border: 1px solid var(--border-strong); border-radius: 6px; padding: 7px 10px; background: var(--bg); color: var(--text); outline: none; }
  .form-row input:focus { border-color: var(--accent); }
  .form-actions { display: flex; gap: 8px; }
  .btn-save { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 7px 16px; font-size: 13px; cursor: pointer; font-family: var(--font); }
  .btn-save:hover { opacity: .88; }
  .btn-cancel { background: none; border: 1px solid var(--border-strong); border-radius: 6px; padding: 7px 12px; font-size: 13px; cursor: pointer; color: var(--text-secondary); font-family: var(--font); }

  #loading { display: none; font-size: 13px; color: var(--text-tertiary); padding: 1rem 0; font-style: italic; }
  #error-msg { display: none; font-size: 13px; color: #991B1B; background: #FEE2E2; border-radius: 6px; padding: 8px 12px; margin-bottom: 1rem; }
</style>
</head>
<body>

<!-- Auth -->
<div id="auth-screen">
  <div class="auth-card">
    <img src="icon.png" alt="Logo" class="auth-logo">
    <div class="auth-title">Gestión de Iniciativas</div>
    <div class="auth-sub">Seguimiento de desarrollo por proyectos e iniciativas</div>
    <div class="auth-field">
      <label for="auth-email">Correo electrónico</label>
      <input type="email" id="auth-email" placeholder="usuario@ejemplo.com" autocomplete="email">
    </div>
    <div class="auth-field">
      <label for="auth-password">Contraseña</label>
      <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-login">Entrar</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- App -->
<div id="app-screen">
  <div class="layout">
    <div class="header">
      <div class="header-left">
        <h1>Mis proyectos</h1>
        <p>Seguimiento de desarrollo por iniciativas</p>
      </div>
      <div class="header-right">
        <span class="user-chip" id="user-name"></span>
        <button class="btn-signout" id="btn-signout">Cerrar sesión</button>
      </div>
    </div>

    <div id="error-msg"></div>
    <div id="loading">Cargando proyectos…</div>

    <div class="section-title">Proyectos</div>
    <div class="projects-grid" id="projects-grid"></div>

    <div id="new-project-form" style="display:none" class="inline-form">
      <div class="form-row">
        <input id="new-project-name" placeholder="Nombre del proyecto (ej: Cliente ACME)" maxlength="80">
      </div>
      <div class="form-actions">
        <button class="btn-save" id="btn-create-project">Crear proyecto</button>
        <button class="btn-cancel" id="btn-cancel-project">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCdmEIoDpZ_C9iJPLBrsTRpF8rcV3ad_7I",
  authDomain: "gestion-tareas-6a390.firebaseapp.com",
  projectId: "gestion-tareas-6a390",
  storageBucket: "gestion-tareas-6a390.firebasestorage.app",
  messagingSenderId: "943514904599",
  appId: "1:943514904599:web:6f65d94a546f47fd50d452",
  databaseURL: "https://gestion-tareas-6a390-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();


let projectsRef = null;
let currentUid = null;

auth.onAuthStateChanged(user => {
  if (user) {
    if (currentUid === user.uid) return; // ya inicializado para este usuario
    currentUid = user.uid;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('user-name').textContent = user.displayName || user.email;
    loadProjects(user.uid);
  } else {
    currentUid = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    if (projectsRef) { projectsRef.off(); projectsRef = null; }
  }
});

function doLogin() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('auth-error');
  if (!email || !password) return;
  btn.disabled = true; btn.textContent = 'Entrando…';
  errEl.style.display = 'none';
  auth.signInWithEmailAndPassword(email, password)
    .catch(err => {
      const msgs = {
        'auth/user-not-found': 'Usuario no encontrado.',
        'auth/wrong-password': 'Contraseña incorrecta.',
        'auth/invalid-email': 'Correo no válido.',
        'auth/too-many-requests': 'Demasiados intentos. Espera un momento.',
        'auth/invalid-credential': 'Credenciales incorrectas.',
      };
      errEl.textContent = msgs[err.code] || err.message;
      errEl.style.display = 'block';
    })
    .finally(() => { btn.disabled = false; btn.textContent = 'Entrar'; });
}

document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('auth-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('auth-email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('auth-password').focus(); });

document.getElementById('btn-signout').addEventListener('click', () => auth.signOut());

function loadProjects(uid) {
  document.getElementById('loading').style.display = 'block';
  // Escucha solo metadata ligera, no el árbol completo de sistemas/tareas
  projectsRef = db.ref('user_projects/' + uid);
  projectsRef.on('value', snap => {
    document.getElementById('loading').style.display = 'none';
    const docs = [];
    snap.forEach(child => {
      const val = child.val();
      if (val) docs.push({ id: child.key, data: val });
    });
    docs.sort((a, b) => (a.data.createdAt || 0) - (b.data.createdAt || 0));
    renderProjects(docs);
  }, err => {
    document.getElementById('loading').style.display = 'none';
    showError(err.message);
  });
}

function renderProjects(docs) {
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = docs.map(doc => {
    const d = doc.data;
    const date = d.createdAt ? new Date(d.createdAt).toLocaleDateString('es-ES') : '';
    return `<div class="project-card" onclick="openProject('${doc.id}')">
      <div class="pc-name">${escHtml(d.name)}</div>
      <div class="pc-meta">${date}</div>
      <div class="pc-footer"><span class="pc-open">Abrir →</span></div>
    </div>`;
  }).join('') + `<button class="new-project-card" id="btn-new-project">
    <span style="font-size:20px;line-height:1">+</span> Nuevo proyecto
  </button>`;
  document.getElementById('btn-new-project').addEventListener('click', showNewProjectForm);
}

function showNewProjectForm() {
  document.getElementById('new-project-form').style.display = 'flex';
  document.getElementById('new-project-name').focus();
}

document.getElementById('btn-cancel-project').addEventListener('click', () => {
  document.getElementById('new-project-form').style.display = 'none';
  document.getElementById('new-project-name').value = '';
});

document.getElementById('btn-create-project').addEventListener('click', createProject);
document.getElementById('new-project-name').addEventListener('keydown', e => { if (e.key === 'Enter') createProject(); });

async function createProject() {
  const name = document.getElementById('new-project-name').value.trim();
  if (!name) return;
  const user = auth.currentUser;
  const btn = document.getElementById('btn-create-project');
  btn.disabled = true; btn.textContent = 'Creando…';
  try {
    const newKey = db.ref().push().key;
    const ts = firebase.database.ServerValue.TIMESTAMP;
    await db.ref().update({
      [`user_projects/${user.uid}/${newKey}`]: { name, createdAt: ts },
      [`projects/${user.uid}/${newKey}/name`]: name,
      [`projects/${user.uid}/${newKey}/createdAt`]: ts
    });
    document.getElementById('new-project-form').style.display = 'none';
    document.getElementById('new-project-name').value = '';
  } catch(err) {
    showError(err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Crear proyecto';
  }
}

function openProject(id) {
  window.location.href = 'proyecto.html?id=' + id;
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
