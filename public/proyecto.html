<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Iniciativas</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/icon.png">
<link rel="apple-touch-icon" href="/icon.png">
<meta name="theme-color" content="#7C3AED">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Iniciativas">
<style>
  :root {
    --bg: #F7F6F3; --surface: #FFFFFF; --border: #E2DFD8; --border-strong: #C8C4BB;
    --text: #1A1916; --text-secondary: #6B6860; --text-tertiary: #A09C94;
    --accent: #2D5BE3; --accent-light: #EEF2FD;
    --font: 'Inter', system-ui, sans-serif; --mono: 'JetBrains Mono', 'Fira Mono', monospace;
    --s-pendiente-bg: #FEF3C7; --s-pendiente-text: #92400E;
    --s-en-curso-bg: #DBEAFE; --s-en-curso-text: #1E40AF;
    --s-hecho-bg: #D1FAE5; --s-hecho-text: #065F46;
    --s-bloqueado-bg: #FEE2E2; --s-bloqueado-text: #991B1B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }

  .layout { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .header { margin-bottom: 2rem; }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: .25rem; }
  .header-left { display: flex; align-items: baseline; gap: 12px; }
  .back-btn { font-size: 12px; color: var(--text-tertiary); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; cursor: pointer; font-family: var(--font); white-space: nowrap; }
  .back-btn:hover { border-color: var(--border-strong); color: var(--text); }
  .project-name { font-size: 22px; font-weight: 600; letter-spacing: -.02em; cursor: pointer; }
  .project-name:hover { text-decoration: underline; text-decoration-style: dotted; }
  .header-meta-row { display: flex; align-items: center; gap: 12px; }
  .header-meta { font-size: 12px; color: var(--text-tertiary); font-family: var(--mono); }
  .saving-indicator { font-size: 12px; color: var(--text-tertiary); font-style: italic; opacity: 0; transition: opacity .2s; }
  .saving-indicator.visible { opacity: 1; }
  .header-sub { font-size: 13px; color: var(--text-secondary); }

  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 2rem; }
  .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .75rem 1rem; }
  .sum-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .sum-value { font-size: 26px; font-weight: 600; font-family: var(--mono); }
  .sum-card.pendiente .sum-value { color: #D97706; }
  .sum-card.en-curso .sum-value { color: #1E40AF; }
  .sum-card.bloqueado .sum-value { color: #991B1B; }
  .sum-card.hecho .sum-value { color: #065F46; }

  .pending-section { margin-bottom: 2rem; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-tertiary); margin-bottom: .75rem; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .pending-list { display: flex; flex-direction: column; gap: 6px; }
  .pending-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .6rem 1rem; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .pending-item:hover { border-color: var(--border-strong); }
  .pending-item .status { width: 140px; text-align: center; flex-shrink: 0; }
  .pi-desc { flex: 1; font-size: 13px; min-width: 160px; }
  .pi-wave { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
  .pi-chip { font-size: 11px; font-family: var(--mono); font-weight: 600; white-space: nowrap; border-radius: 4px; padding: 1px 7px; }
  .pi-chip.inicia { background: #EEF2FD; color: #2D5BE3; }
  .pi-chip.sist   { background: #F3F4F6; color: #374151; border: 1px solid #E5E7EB; }
  .pi-person { font-size: 12px; color: var(--text-secondary); }

  .sistema-block { margin-bottom: 1.5rem; }
  .sistema-header { display: flex; align-items: center; gap: 10px; margin-bottom: .75rem; cursor: pointer; user-select: none; }
  .sistema-name { font-size: 13px; font-weight: 600; font-family: var(--mono); letter-spacing: .04em; }
  .sistema-count { font-size: 11px; color: var(--text-tertiary); background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px; }
  .sistema-toggle { font-size: 12px; color: var(--text-tertiary); margin-left: auto; transition: transform .2s; }
  .sistema-toggle.open { transform: rotate(180deg); }

  .inicia-block { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); margin-bottom: 8px; overflow: hidden; }
  .inicia-header { display: flex; align-items: center; gap: 10px; padding: .6rem .9rem; cursor: pointer; user-select: none; background: var(--surface); }
  .inicia-header:hover { background: var(--bg); }
  .inicia-label { font-size: 12px; font-weight: 600; font-family: var(--mono); color: var(--text-secondary); }
  .inicia-toggle { font-size: 11px; color: var(--text-tertiary); margin-left: auto; }
  .inicia-stats { display: flex; gap: 6px; flex-wrap: wrap; }
  .inicia-body { padding: .75rem .9rem; border-top: 1px solid var(--border); display: none; }
  .inicia-body.open { display: block; }

  .task-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; padding: .5rem 0; border-bottom: 1px solid var(--border); }
  .task-row:last-child { border-bottom: none; padding-bottom: 0; }
  .task-main { display: flex; flex-direction: column; gap: 4px; }
  .task-desc { font-size: 13px; color: var(--text); }
  .task-desc.hecho { text-decoration: line-through; color: var(--text-tertiary); }
  .task-ticket { font-size: 11px; font-family: var(--mono); color: var(--text-tertiary); }
  .task-note { font-size: 12px; color: var(--text-secondary); font-style: italic; margin-top: 2px; }
  .task-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
  .task-person { font-size: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 7px; color: var(--text-secondary); }
  .task-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .task-actions { display: flex; flex-direction: row; gap: 4px; align-items: center; }

  .status { font-size: 11px; font-weight: 600; border-radius: 4px; padding: 2px 8px; white-space: nowrap; cursor: pointer; border: none; font-family: var(--font); }
  .status.pendiente { background: var(--s-pendiente-bg); color: var(--s-pendiente-text); }
  .status.en-curso  { background: var(--s-en-curso-bg); color: var(--s-en-curso-text); }
  .status.hecho     { background: var(--s-hecho-bg);    color: var(--s-hecho-text); }
  .status.bloqueado { background: var(--s-bloqueado-bg);color: var(--s-bloqueado-text); }

  .add-task-btn { font-size: 12px; color: var(--text-tertiary); background: none; border: 1px dashed var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; width: 100%; text-align: left; margin-top: 8px; }
  .add-task-btn:hover { border-color: var(--border-strong); color: var(--text-secondary); background: var(--bg); }
  .inline-form { background: var(--bg); border-radius: 6px; padding: .75rem; margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .form-row input, .form-row select, .form-row textarea {
    font-size: 13px; font-family: var(--font); border: 1px solid var(--border-strong);
    border-radius: 6px; padding: 5px 9px; background: var(--surface); color: var(--text); outline: none;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
  .form-row input.f-desc { flex: 1; min-width: 200px; }
  .form-row input.f-ticket { width: 100px; font-family: var(--mono); }
  .form-row input.f-person { width: 140px; }
  .form-row select.f-status { width: 140px; }
  .form-row textarea.f-note { flex: 1; min-width: 200px; resize: vertical; min-height: 50px; }
  .form-actions { display: flex; gap: 6px; }
  .btn-save { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 5px 14px; font-size: 13px; cursor: pointer; font-family: var(--font); }
  .btn-save:hover { opacity: .88; }
  .btn-cancel { background: none; border: 1px solid var(--border-strong); border-radius: 6px; padding: 5px 12px; font-size: 13px; cursor: pointer; color: var(--text-secondary); font-family: var(--font); }

  .add-inicia-btn { font-size: 12px; color: var(--text-tertiary); background: none; border: 1px dashed var(--border); border-radius: 6px; padding: 4px 12px; cursor: pointer; margin-bottom: 1.5rem; }
  .add-inicia-btn:hover { border-color: var(--border-strong); color: var(--text-secondary); }
  .add-sistema-btn { font-size: 12px; color: var(--accent); background: var(--accent-light); border: none; border-radius: 6px; padding: 5px 14px; cursor: pointer; margin-bottom: 2rem; font-weight: 500; }
  .inicia-inline-form { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; padding: .5rem .75rem; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); }
  .inicia-inline-form input { font-size: 13px; font-family: var(--font); border: 1px solid var(--border-strong); border-radius: 6px; padding: 4px 9px; background: var(--surface); color: var(--text); }
  .empty-inicia { font-size: 13px; color: var(--text-tertiary); font-style: italic; padding: .25rem 0; }
  .del-btn { font-size: 13px; color: #fff; background: #EF4444; border: none; cursor: pointer; padding: 3px 8px; border-radius: 5px; line-height: 1; }
  .del-btn:hover { background: #DC2626; }
  .edit-btn { font-size: 13px; color: #fff; background: #6366F1; border: none; cursor: pointer; padding: 3px 8px; border-radius: 5px; line-height: 1; }
  .edit-btn:hover { background: #4F46E5; }
  .task-edit-form { background: var(--bg); border: 1px solid var(--accent); border-radius: 8px; padding: .75rem; margin: 6px 0; display: flex; flex-direction: column; gap: 8px; }
  .task-edit-form .form-row select.f-dest { flex: 1; min-width: 180px; font-size: 12px; }

  #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1A1916; color: #fff; font-size: 13px; padding: 8px 16px; border-radius: 8px; pointer-events: none; opacity: 0; transition: opacity .2s; z-index: 1000; }
  #toast.show { opacity: 1; }
  #toast.error { background: #991B1B; }

  #loading-overlay { display: flex; align-items: center; justify-content: center; min-height: 50vh; font-size: 13px; color: var(--text-tertiary); font-style: italic; }

  @media print {
    .add-task-btn, .add-inicia-btn, .add-sistema-btn, .inline-form, .inicia-inline-form, .del-btn, .form-actions, .back-btn { display: none !important; }
    .inicia-body { display: block !important; }
  }
</style>
</head>
<body>

<div id="loading-overlay">Verificando sesión…</div>

<div class="layout" id="main-layout" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <button class="back-btn" id="back-btn">← Proyectos</button>
        <div class="project-name" id="project-name" title="Haz clic para editar"></div>
      </div>
      <div class="header-meta-row">
        <span class="saving-indicator" id="saving-indicator">Guardando…</span>
        <span class="header-meta" id="last-updated"></span>
      </div>
    </div>
    <div class="header-sub">Seguimiento de desarrollo por iniciativas</div>
  </div>

  <div class="summary">
    <div class="sum-card pendiente"><div class="sum-label">Pendiente</div><div class="sum-value" id="cnt-pendiente">0</div></div>
    <div class="sum-card en-curso"><div class="sum-label">En curso</div><div class="sum-value" id="cnt-en-curso">0</div></div>
    <div class="sum-card bloqueado"><div class="sum-label">Bloqueado</div><div class="sum-value" id="cnt-bloqueado">0</div></div>
    <div class="sum-card hecho"><div class="sum-label">Hecho</div><div class="sum-value" id="cnt-hecho">0</div></div>
  </div>

  <div class="pending-section">
    <div class="section-title">Requieren atención</div>
    <div class="pending-list" id="pending-list"></div>
  </div>

  <div class="section-title">Detalle por sistema e iniciativa</div>
  <div id="sistemas-container"></div>
  <button class="add-sistema-btn" id="add-sistema-btn">+ Añadir sistema</button>
</div>

<div id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCdmEIoDpZ_C9iJPLBrsTRpF8rcV3ad_7I",
  authDomain: "gestion-tareas-6a390.firebaseapp.com",
  projectId: "gestion-tareas-6a390",
  storageBucket: "gestion-tareas-6a390.firebasestorage.app",
  messagingSenderId: "943514904599",
  appId: "1:943514904599:web:6f65d94a546f47fd50d452",
  databaseURL: "https://gestion-tareas-6a390-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const STATUS_ORDER = ['pendiente', 'en-curso', 'bloqueado', 'hecho'];

function statusLabel(s) {
  return { pendiente: 'Pendiente', 'en-curso': 'En curso', hecho: 'Hecho', bloqueado: 'Bloqueado' }[s] || s;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const params = new URLSearchParams(location.search);
const PROJECT_ID = params.get('id');
if (!PROJECT_ID) { location.href = 'index.html'; }

let savingCount = 0;
function startSaving() {
  savingCount++;
  document.getElementById('saving-indicator').classList.add('visible');
}
function doneSaving() {
  if (--savingCount <= 0) {
    savingCount = 0;
    document.getElementById('saving-indicator').classList.remove('visible');
    document.getElementById('last-updated').textContent =
      'Guardado ' + new Date().toLocaleString('es-ES', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  }
}

let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 4000);
}

let state = { projectName: '', sistemas: [] };
let uid;
let projectPath;

auth.onAuthStateChanged(user => {
  if (!user) { location.href = 'index.html'; return; }
  uid = user.uid;
  projectPath = `projects/${uid}/${PROJECT_ID}`;
  initProject();
});

async function initProject() {
  try {
    const snap = await db.ref(projectPath).once('value');
    if (!snap.exists()) { location.href = 'index.html'; return; }
    state.projectName = snap.val().name || '';
    document.getElementById('project-name').textContent = state.projectName;
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('main-layout').style.display = 'block';
    subscribeToProject();
  } catch(e) {
    document.getElementById('loading-overlay').textContent = 'Error al cargar: ' + e.message;
  }
}

function subscribeToProject() {
  db.ref(projectPath).on('value', snap => {
    const data = snap.val();
    if (!data) { location.href = 'index.html'; return; }
    state.projectName = data.name || '';
    state.sistemas = [];
    if (data.sistemas) {
      for (const [sistId, sist] of Object.entries(data.sistemas)) {
        if (!sist) continue;
        const sistObj = { id: sistId, name: sist.name || '', order: sist.order ?? 0, open: sist.open ?? true, iniciativas: [] };
        if (sist.iniciativas) {
          for (const [inicId, inic] of Object.entries(sist.iniciativas)) {
            if (!inic) continue;
            const inicObj = { id: inicId, name: inic.name || '', order: inic.order ?? 0, open: inic.open ?? true, tasks: [] };
            if (inic.tasks) {
              for (const [taskId, task] of Object.entries(inic.tasks)) {
                if (!task) continue;
                inicObj.tasks.push({ id: taskId, desc: task.desc || '', ticket: task.ticket || '', person: task.person || '', status: task.status || 'en-curso', note: task.note || '', order: task.order ?? 0 });
              }
              inicObj.tasks.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
            }
            sistObj.iniciativas.push(inicObj);
          }
          sistObj.iniciativas.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
        }
        state.sistemas.push(sistObj);
      }
      state.sistemas.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    }
    renderAll();
  }, err => showToast('Error cargando datos: ' + err.message, true));
}

// Path helpers
function pSist(sistId) { return `${projectPath}/sistemas/${sistId}`; }
function pInic(sistId, inicId) { return `${pSist(sistId)}/iniciativas/${inicId}`; }
function pTask(sistId, inicId, taskId) { return `${pInic(sistId, inicId)}/tasks/${taskId}`; }

async function writeData(path, data) {
  startSaving();
  try {
    await db.ref(path).update(data);
    doneSaving();
  } catch(e) {
    doneSaving();
    showToast('Error al guardar: ' + e.message, true);
  }
}

function renderAll() {
  const allTasks = state.sistemas.flatMap(s => s.iniciativas.flatMap(i => i.tasks));

  ['pendiente','en-curso','bloqueado','hecho'].forEach(st => {
    document.getElementById('cnt-' + st).textContent = allTasks.filter(t => t.status === st).length;
  });

  const pendingList = document.getElementById('pending-list');
  const attention = allTasks.filter(t => t.status === 'pendiente' || t.status === 'bloqueado');
  if (attention.length === 0) {
    pendingList.innerHTML = '<div style="font-size:13px;color:var(--text-tertiary);font-style:italic;padding:.5rem 0">Todo al día ✓</div>';
  } else {
    pendingList.innerHTML = attention.map(t => {
      const sist = state.sistemas.find(s => s.iniciativas.some(i => i.tasks.some(x => x.id === t.id)));
      const inic = sist?.iniciativas.find(i => i.tasks.some(x => x.id === t.id));
      return `<div class="pending-item">
        <button class="status ${t.status}" onclick="cycleStatus('${escHtml(sist.id)}','${escHtml(inic.id)}','${t.id}')">${statusLabel(t.status)}</button>
        <span class="pi-desc">${escHtml(t.desc)}${t.ticket ? ' <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text)">#'+escHtml(t.ticket)+'</span>' : ''}</span>
        <span class="pi-wave"><span class="pi-chip inicia">${escHtml(inic?.name||'')}</span><span class="pi-chip sist">${escHtml(sist?.name||'')}</span></span>
        ${t.person ? '<span class="pi-person">↳ ' + escHtml(t.person) + '</span>' : ''}
      </div>`;
    }).join('');
  }

  const container = document.getElementById('sistemas-container');
  container.innerHTML = state.sistemas.map(s => {
    const allS = s.iniciativas.flatMap(i => i.tasks);
    const openTasks = allS.filter(t => t.status !== 'hecho').length;
    const inicHtml = s.iniciativas.map(i => {
      const counts = { pendiente: 0, 'en-curso': 0, bloqueado: 0, hecho: 0 };
      i.tasks.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });
      const statsHtml = Object.entries(counts).filter(([,v]) => v > 0)
        .map(([k,v]) => `<span class="status ${k}" style="font-size:10px">${v} ${statusLabel(k)}</span>`).join('');
      const tasksHtml = i.tasks.length === 0
        ? '<div class="empty-inicia">Sin tareas aún</div>'
        : i.tasks.map(t => `
          <div class="task-row" id="trow-${s.id}-${i.id}-${t.id}">
            <div class="task-main">
              <span class="task-desc ${t.status === 'hecho' ? 'hecho' : ''}">${escHtml(t.desc)}</span>
              ${t.ticket ? '<span class="task-ticket">#' + escHtml(t.ticket) + '</span>' : ''}
              ${t.note ? '<span class="task-note">' + escHtml(t.note) + '</span>' : ''}
              <div class="task-meta">
                ${t.person ? '<span class="task-person">↳ ' + escHtml(t.person) + '</span>' : ''}
              </div>
            </div>
            <div class="task-right">
              <button class="status ${t.status}" onclick="cycleStatus('${escHtml(s.id)}','${escHtml(i.id)}','${t.id}')" title="Haz clic para cambiar estado">${statusLabel(t.status)}</button>
              <div class="task-actions">
                <button class="edit-btn" onclick="showEditTask('${escHtml(s.id)}','${escHtml(i.id)}','${t.id}')" title="Editar">✎</button>
                <button class="del-btn" onclick="deleteTask('${escHtml(s.id)}','${escHtml(i.id)}','${t.id}')" title="Eliminar">×</button>
              </div>
            </div>
          </div>`).join('');
      return `
        <div class="inicia-block">
          <div class="inicia-header" onclick="toggleIniciativa('${escHtml(s.id)}','${escHtml(i.id)}')">
            <span class="inicia-label">${escHtml(i.name)}</span>
            <div class="inicia-stats">${statsHtml}</div>
            <span class="inicia-toggle">${i.open ? '▲' : '▼'}</span>
          </div>
          <div class="inicia-body ${i.open ? 'open' : ''}" id="tasks-${s.id}-${i.id}">
            ${tasksHtml}
            <button class="add-task-btn" onclick="showAddTask('${escHtml(s.id)}','${escHtml(i.id)}')">+ Añadir tarea</button>
          </div>
        </div>`;
    }).join('');
    return `
      <div class="sistema-block">
        <div class="sistema-header" onclick="toggleSistema('${escHtml(s.id)}')">
          <span class="sistema-name">${escHtml(s.name)}</span>
          <span class="sistema-count">${openTasks} abiertas / ${allS.length} total</span>
          <span class="sistema-toggle ${s.open ? 'open' : ''}">▼</span>
        </div>
        ${s.open ? `<div id="iniciativas-${s.id}">${inicHtml}<button class="add-inicia-btn" onclick="showAddIniciativa('${escHtml(s.id)}')">+ Añadir iniciativa</button></div>` : ''}
      </div>`;
  }).join('');
}

function cycleStatus(sistId, inicId, taskId) {
  const sist = state.sistemas.find(s => s.id === sistId);
  const inic = sist.iniciativas.find(i => i.id === inicId);
  const task = inic.tasks.find(t => t.id === taskId);
  const next = STATUS_ORDER[(STATUS_ORDER.indexOf(task.status) + 1) % STATUS_ORDER.length];
  writeData(pTask(sistId, inicId, taskId), { status: next });
}

function deleteTask(sistId, inicId, taskId) {
  if (!confirm('¿Eliminar esta tarea?')) return;
  startSaving();
  db.ref(pTask(sistId, inicId, taskId)).remove()
    .then(doneSaving)
    .catch(e => { doneSaving(); showToast('Error: ' + e.message, true); });
}

function showEditTask(sistId, inicId, taskId) {
  const rowId = `trow-${sistId}-${inicId}-${taskId}`;
  const formId = `tedit-${sistId}-${inicId}-${taskId}`;
  if (document.getElementById(formId)) { document.getElementById(formId).remove(); return; }
  const row = document.getElementById(rowId);
  if (!row) return;

  const sist = state.sistemas.find(s => s.id === sistId);
  const inic = sist?.iniciativas.find(i => i.id === inicId);
  const task = inic?.tasks.find(t => t.id === taskId);
  if (!task) return;

  const sistOptions = state.sistemas.map(s =>
    `<option value="${escHtml(s.id)}" ${s.id === sistId ? 'selected' : ''}>${escHtml(s.name)}</option>`
  ).join('');
  const inicOptions = sist.iniciativas.map(i =>
    `<option value="${escHtml(i.id)}" ${i.id === inicId ? 'selected' : ''}>${escHtml(i.name)}</option>`
  ).join('');

  const form = document.createElement('div');
  form.className = 'task-edit-form'; form.id = formId;
  form.innerHTML = `
    <div class="form-row">
      <input class="f-desc" placeholder="Descripción" id="fe-desc-${formId}" value="${escHtml(task.desc)}">
      <input class="f-ticket" placeholder="Ticket / ID" id="fe-ticket-${formId}" value="${escHtml(task.ticket)}">
    </div>
    <div class="form-row">
      <input class="f-person" placeholder="Persona asignada" id="fe-person-${formId}" value="${escHtml(task.person)}">
      <select class="f-status" id="fe-status-${formId}">
        <option value="pendiente" ${task.status==='pendiente'?'selected':''}>Pendiente</option>
        <option value="en-curso" ${task.status==='en-curso'?'selected':''}>En curso</option>
        <option value="bloqueado" ${task.status==='bloqueado'?'selected':''}>Bloqueado</option>
        <option value="hecho" ${task.status==='hecho'?'selected':''}>Hecho</option>
      </select>
    </div>
    <div class="form-row">
      <textarea class="f-note" placeholder="Nota o contexto" id="fe-note-${formId}">${escHtml(task.note)}</textarea>
    </div>
    <div class="form-row" style="align-items:center;gap:6px">
      <span style="font-size:11px;color:var(--text-tertiary);white-space:nowrap">Mover a:</span>
      <select class="f-dest" id="fe-sist-${formId}" onchange="updateInicOptions('${formId}',this.value,'${inicId}')">${sistOptions}</select>
      <select class="f-dest" id="fe-inic-${formId}">${inicOptions}</select>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveEditTask('${sistId}','${inicId}','${taskId}','${formId}')">Guardar</button>
      <button class="btn-cancel" onclick="document.getElementById('${formId}').remove()">Cancelar</button>
    </div>`;
  row.after(form);
  document.getElementById('fe-desc-' + formId).focus();
}

function updateInicOptions(formId, newSistId, currentInicId) {
  const sist = state.sistemas.find(s => s.id === newSistId);
  if (!sist) return;
  const sel = document.getElementById('fe-inic-' + formId);
  sel.innerHTML = sist.iniciativas.map(i =>
    `<option value="${escHtml(i.id)}">${escHtml(i.name)}</option>`
  ).join('');
}

async function saveEditTask(origSistId, origInicId, taskId, formId) {
  const desc = document.getElementById('fe-desc-' + formId)?.value.trim();
  if (!desc) return;
  const newSistId = document.getElementById('fe-sist-' + formId)?.value;
  const newInicId = document.getElementById('fe-inic-' + formId)?.value;
  const data = {
    desc,
    ticket: document.getElementById('fe-ticket-' + formId)?.value.trim() || '',
    person: document.getElementById('fe-person-' + formId)?.value.trim() || '',
    status: document.getElementById('fe-status-' + formId)?.value || 'en-curso',
    note: document.getElementById('fe-note-' + formId)?.value.trim() || '',
  };

  startSaving();
  try {
    const isMoved = newSistId !== origSistId || newInicId !== origInicId;
    if (isMoved) {
      // Recuperar orden original y createdAt
      const snap = await db.ref(pTask(origSistId, origInicId, taskId)).once('value');
      const orig = snap.val() || {};
      const destSist = state.sistemas.find(s => s.id === newSistId);
      const destInic = destSist?.iniciativas.find(i => i.id === newInicId);
      const maxOrder = destInic ? Math.max(-1, ...destInic.tasks.map(t => t.order ?? 0)) : 0;
      await db.ref().update({
        [pTask(origSistId, origInicId, taskId)]: null,
        [pTask(newSistId, newInicId, taskId)]: { ...data, order: maxOrder + 1, createdAt: orig.createdAt || firebase.database.ServerValue.TIMESTAMP }
      });
    } else {
      await db.ref(pTask(origSistId, origInicId, taskId)).update(data);
    }
    doneSaving();
    document.getElementById(formId)?.remove();
  } catch(e) {
    doneSaving();
    showToast('Error al guardar: ' + e.message, true);
  }
}

function toggleIniciativa(sistId, inicId) {
  const sist = state.sistemas.find(s => s.id === sistId);
  const inic = sist.iniciativas.find(i => i.id === inicId);
  writeData(pInic(sistId, inicId), { open: !inic.open });
}

function toggleSistema(sistId) {
  const sist = state.sistemas.find(s => s.id === sistId);
  writeData(pSist(sistId), { open: !sist.open });
}

function showAddTask(sistId, inicId) {
  const formId = 'form-' + sistId + '-' + inicId;
  const existing = document.getElementById(formId);
  if (existing) { existing.remove(); return; }
  const container = document.getElementById('tasks-' + sistId + '-' + inicId);
  if (!container) return;
  const form = document.createElement('div');
  form.className = 'inline-form'; form.id = formId;
  form.innerHTML = `
    <div class="form-row">
      <input class="f-desc" placeholder="Descripción de la tarea" id="fd-desc-${formId}">
      <input class="f-ticket" placeholder="Ticket / ID" id="fd-ticket-${formId}">
    </div>
    <div class="form-row">
      <input class="f-person" placeholder="Persona asignada" id="fd-person-${formId}">
      <select class="f-status" id="fd-status-${formId}">
        <option value="pendiente">Pendiente</option>
        <option value="en-curso" selected>En curso</option>
        <option value="bloqueado">Bloqueado</option>
        <option value="hecho">Hecho</option>
      </select>
    </div>
    <div class="form-row">
      <textarea class="f-note" placeholder="Nota o contexto (opcional)" id="fd-note-${formId}"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveTask('${sistId}','${inicId}','${formId}')">Guardar</button>
      <button class="btn-cancel" onclick="document.getElementById('${formId}').remove()">Cancelar</button>
    </div>`;
  container.appendChild(form);
  document.getElementById('fd-desc-' + formId).focus();
}

async function saveTask(sistId, inicId, formId) {
  const desc = document.getElementById('fd-desc-' + formId)?.value.trim();
  if (!desc) return;
  const sist = state.sistemas.find(s => s.id === sistId);
  const inic = sist?.iniciativas.find(i => i.id === inicId);
  const maxOrder = inic ? Math.max(-1, ...inic.tasks.map(t => t.order ?? 0)) : 0;
  startSaving();
  try {
    await db.ref(pInic(sistId, inicId) + '/tasks').push({
      desc,
      ticket: document.getElementById('fd-ticket-' + formId)?.value.trim() || '',
      person: document.getElementById('fd-person-' + formId)?.value.trim() || '',
      status: document.getElementById('fd-status-' + formId)?.value || 'en-curso',
      note: document.getElementById('fd-note-' + formId)?.value.trim() || '',
      order: maxOrder + 1,
      createdAt: firebase.database.ServerValue.TIMESTAMP
    });
    doneSaving();
    document.getElementById(formId)?.remove();
  } catch(e) {
    doneSaving();
    showToast('Error al guardar tarea: ' + e.message, true);
  }
}

function showAddIniciativa(sistId) {
  const formId = 'iform-' + sistId;
  const existing = document.getElementById(formId);
  if (existing) { existing.remove(); return; }
  const container = document.getElementById('iniciativas-' + sistId);
  if (!container) return;
  const form = document.createElement('div');
  form.className = 'inicia-inline-form'; form.id = formId;
  form.innerHTML = `
    <input placeholder="Nombre de la iniciativa (ej: Iniciativa 10)" id="if-name-${formId}" style="flex:1;min-width:160px">
    <button class="btn-save" onclick="saveIniciativa('${sistId}','${formId}')">Añadir</button>
    <button class="btn-cancel" onclick="document.getElementById('${formId}').remove()">✕</button>`;
  const addBtn = container.querySelector('.add-inicia-btn');
  container.insertBefore(form, addBtn);
  document.getElementById('if-name-' + formId).focus();
}

async function saveIniciativa(sistId, formId) {
  const name = document.getElementById('if-name-' + formId)?.value.trim();
  if (!name) return;
  const sist = state.sistemas.find(s => s.id === sistId);
  const maxOrder = sist ? Math.max(-1, ...sist.iniciativas.map(i => i.order ?? 0)) : 0;
  startSaving();
  try {
    await db.ref(pSist(sistId) + '/iniciativas').push({ name, order: maxOrder + 1, open: true });
    doneSaving();
    document.getElementById(formId)?.remove();
  } catch(e) {
    doneSaving();
    showToast('Error al crear iniciativa: ' + e.message, true);
  }
}

document.getElementById('add-sistema-btn').addEventListener('click', async () => {
  const name = prompt('Nombre del sistema:');
  if (!name?.trim()) return;
  const maxOrder = Math.max(-1, ...state.sistemas.map(s => s.order ?? 0));
  startSaving();
  try {
    await db.ref(projectPath + '/sistemas').push({ name: name.trim(), order: maxOrder + 1, open: true });
    doneSaving();
  } catch(e) {
    doneSaving();
    showToast('Error al crear sistema: ' + e.message, true);
  }
});

document.getElementById('project-name').addEventListener('click', () => {
  const el = document.getElementById('project-name');
  const current = state.projectName;
  const input = document.createElement('input');
  input.value = current;
  input.style.cssText = 'font-size:22px;font-weight:600;letter-spacing:-.02em;border:1px solid #2D5BE3;border-radius:4px;padding:2px 6px;font-family:inherit;color:inherit;background:#fff;';
  el.replaceWith(input);
  input.focus(); input.select();
  async function finish() {
    const newName = input.value.trim() || current;
    state.projectName = newName;
    const restored = document.createElement('div');
    restored.id = 'project-name'; restored.className = 'project-name'; restored.title = 'Haz clic para editar';
    restored.textContent = newName;
    input.replaceWith(restored);
    restored.addEventListener('click', arguments.callee);
    if (newName !== current) {
      startSaving();
      try {
        await db.ref().update({
          [`${projectPath}/name`]: newName,
          [`user_projects/${uid}/${PROJECT_ID}/name`]: newName
        });
        doneSaving();
      } catch(e) { doneSaving(); showToast('Error: ' + e.message, true); }
    }
  }
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') finish(); if (e.key === 'Escape') { input.value = current; finish(); } });
});

document.getElementById('back-btn').addEventListener('click', () => {
  location.href = 'index.html';
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
