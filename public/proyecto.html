<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Oleadas</title>
<style>
  :root {
    --bg: #F7F6F3; --surface: #FFFFFF; --border: #E2DFD8; --border-strong: #C8C4BB;
    --text: #1A1916; --text-secondary: #6B6860; --text-tertiary: #A09C94;
    --accent: #2D5BE3; --accent-light: #EEF2FD;
    --font: 'Inter', system-ui, sans-serif; --mono: 'JetBrains Mono', 'Fira Mono', monospace;
    --s-pendiente-bg: #FEF3C7; --s-pendiente-text: #92400E;
    --s-tercero-bg: #EDE9FE; --s-tercero-text: #5B21B6;
    --s-en-curso-bg: #DBEAFE; --s-en-curso-text: #1E40AF;
    --s-hecho-bg: #D1FAE5; --s-hecho-text: #065F46;
    --s-bloqueado-bg: #FEE2E2; --s-bloqueado-text: #991B1B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }

  .layout { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Header */
  .header { margin-bottom: 2rem; }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: .25rem; }
  .header-left { display: flex; align-items: baseline; gap: 12px; }
  .back-btn { font-size: 12px; color: var(--text-tertiary); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; cursor: pointer; font-family: var(--font); white-space: nowrap; }
  .back-btn:hover { border-color: var(--border-strong); color: var(--text); }
  .project-name { font-size: 22px; font-weight: 600; letter-spacing: -.02em; cursor: pointer; }
  .project-name:hover { text-decoration: underline; text-decoration-style: dotted; }
  .header-meta-row { display: flex; align-items: center; gap: 12px; }
  .header-meta { font-size: 12px; color: var(--text-tertiary); font-family: var(--mono); }
  .saving-indicator { font-size: 12px; color: var(--text-tertiary); font-style: italic; opacity: 0; transition: opacity .2s; }
  .saving-indicator.visible { opacity: 1; }
  .header-sub { font-size: 13px; color: var(--text-secondary); }

  /* Summary */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 2rem; }
  .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .75rem 1rem; }
  .sum-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .sum-value { font-size: 26px; font-weight: 600; font-family: var(--mono); }
  .sum-card.tercero .sum-value { color: #5B21B6; }
  .sum-card.en-curso .sum-value { color: #1E40AF; }
  .sum-card.bloqueado .sum-value { color: #991B1B; }
  .sum-card.hecho .sum-value { color: #065F46; }

  /* Pending */
  .pending-section { margin-bottom: 2rem; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-tertiary); margin-bottom: .75rem; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .pending-list { display: flex; flex-direction: column; gap: 6px; }
  .pending-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .6rem 1rem; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .pending-item:hover { border-color: var(--border-strong); }
  .pi-desc { flex: 1; font-size: 13px; min-width: 160px; }
  .pi-wave { font-size: 11px; color: var(--text-tertiary); font-family: var(--mono); white-space: nowrap; }
  .pi-person { font-size: 12px; color: var(--text-secondary); }

  /* Sistemas */
  .sistema-block { margin-bottom: 1.5rem; }
  .sistema-header { display: flex; align-items: center; gap: 10px; margin-bottom: .75rem; cursor: pointer; user-select: none; }
  .sistema-name { font-size: 13px; font-weight: 600; font-family: var(--mono); letter-spacing: .04em; }
  .sistema-count { font-size: 11px; color: var(--text-tertiary); background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px; }
  .sistema-toggle { font-size: 12px; color: var(--text-tertiary); margin-left: auto; transition: transform .2s; }
  .sistema-toggle.open { transform: rotate(180deg); }

  /* Waves */
  .wave-block { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); margin-bottom: 8px; overflow: hidden; }
  .wave-header { display: flex; align-items: center; gap: 10px; padding: .6rem .9rem; cursor: pointer; user-select: none; background: var(--surface); }
  .wave-header:hover { background: var(--bg); }
  .wave-label { font-size: 12px; font-weight: 600; font-family: var(--mono); color: var(--text-secondary); }
  .wave-toggle { font-size: 11px; color: var(--text-tertiary); margin-left: auto; }
  .wave-stats { display: flex; gap: 6px; flex-wrap: wrap; }
  .wave-body { padding: .75rem .9rem; border-top: 1px solid var(--border); display: none; }
  .wave-body.open { display: block; }

  /* Tasks */
  .task-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; padding: .5rem 0; border-bottom: 1px solid var(--border); }
  .task-row:last-child { border-bottom: none; padding-bottom: 0; }
  .task-main { display: flex; flex-direction: column; gap: 4px; }
  .task-desc { font-size: 13px; color: var(--text); }
  .task-desc.hecho { text-decoration: line-through; color: var(--text-tertiary); }
  .task-ticket { font-size: 11px; font-family: var(--mono); color: var(--text-tertiary); }
  .task-note { font-size: 12px; color: var(--text-secondary); font-style: italic; margin-top: 2px; }
  .task-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
  .task-person { font-size: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 7px; color: var(--text-secondary); }
  .task-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

  /* Status */
  .status { font-size: 11px; font-weight: 600; border-radius: 4px; padding: 2px 8px; white-space: nowrap; cursor: pointer; border: none; font-family: var(--font); }
  .status.tercero   { background: var(--s-tercero-bg);  color: var(--s-tercero-text); }
  .status.en-curso  { background: var(--s-en-curso-bg); color: var(--s-en-curso-text); }
  .status.hecho     { background: var(--s-hecho-bg);    color: var(--s-hecho-text); }
  .status.bloqueado { background: var(--s-bloqueado-bg);color: var(--s-bloqueado-text); }

  /* Forms */
  .add-task-btn { font-size: 12px; color: var(--text-tertiary); background: none; border: 1px dashed var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; width: 100%; text-align: left; margin-top: 8px; }
  .add-task-btn:hover { border-color: var(--border-strong); color: var(--text-secondary); background: var(--bg); }
  .inline-form { background: var(--bg); border-radius: 6px; padding: .75rem; margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .form-row input, .form-row select, .form-row textarea {
    font-size: 13px; font-family: var(--font); border: 1px solid var(--border-strong);
    border-radius: 6px; padding: 5px 9px; background: var(--surface); color: var(--text); outline: none;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
  .form-row input.f-desc { flex: 1; min-width: 200px; }
  .form-row input.f-ticket { width: 100px; font-family: var(--mono); }
  .form-row input.f-person { width: 140px; }
  .form-row select.f-status { width: 140px; }
  .form-row textarea.f-note { flex: 1; min-width: 200px; resize: vertical; min-height: 50px; }
  .form-actions { display: flex; gap: 6px; }
  .btn-save { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 5px 14px; font-size: 13px; cursor: pointer; font-family: var(--font); }
  .btn-save:hover { opacity: .88; }
  .btn-cancel { background: none; border: 1px solid var(--border-strong); border-radius: 6px; padding: 5px 12px; font-size: 13px; cursor: pointer; color: var(--text-secondary); font-family: var(--font); }

  .add-wave-btn { font-size: 12px; color: var(--text-tertiary); background: none; border: 1px dashed var(--border); border-radius: 6px; padding: 4px 12px; cursor: pointer; margin-bottom: 1.5rem; }
  .add-wave-btn:hover { border-color: var(--border-strong); color: var(--text-secondary); }
  .add-sistema-btn { font-size: 12px; color: var(--accent); background: var(--accent-light); border: none; border-radius: 6px; padding: 5px 14px; cursor: pointer; margin-bottom: 2rem; font-weight: 500; }
  .wave-inline-form { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; padding: .5rem .75rem; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); }
  .wave-inline-form input { font-size: 13px; font-family: var(--font); border: 1px solid var(--border-strong); border-radius: 6px; padding: 4px 9px; background: var(--surface); color: var(--text); }
  .empty-wave { font-size: 13px; color: var(--text-tertiary); font-style: italic; padding: .25rem 0; }
  .del-btn { font-size: 11px; color: var(--text-tertiary); background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 4px; }
  .del-btn:hover { background: var(--s-bloqueado-bg); color: var(--s-bloqueado-text); }

  /* Toast */
  #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1A1916; color: #fff; font-size: 13px; padding: 8px 16px; border-radius: 8px; pointer-events: none; opacity: 0; transition: opacity .2s; z-index: 1000; }
  #toast.show { opacity: 1; }
  #toast.error { background: #991B1B; }

  #loading-overlay { display: flex; align-items: center; justify-content: center; min-height: 50vh; font-size: 13px; color: var(--text-tertiary); font-style: italic; }

  @media print {
    .add-task-btn, .add-wave-btn, .add-sistema-btn, .inline-form, .wave-inline-form, .del-btn, .form-actions, .back-btn { display: none !important; }
    .wave-body { display: block !important; }
  }
</style>
</head>
<body>

<div id="loading-overlay">Verificando sesión…</div>

<div class="layout" id="main-layout" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <button class="back-btn" id="back-btn">← Proyectos</button>
        <div class="project-name" id="project-name" title="Haz clic para editar"></div>
      </div>
      <div class="header-meta-row">
        <span class="saving-indicator" id="saving-indicator">Guardando…</span>
        <span class="header-meta" id="last-updated"></span>
      </div>
    </div>
    <div class="header-sub">Seguimiento de desarrollo por oleadas</div>
  </div>

  <div class="summary">
    <div class="sum-card tercero"><div class="sum-label">Esperando tercero</div><div class="sum-value" id="cnt-tercero">0</div></div>
    <div class="sum-card en-curso"><div class="sum-label">En curso</div><div class="sum-value" id="cnt-en-curso">0</div></div>
    <div class="sum-card bloqueado"><div class="sum-label">Bloqueado</div><div class="sum-value" id="cnt-bloqueado">0</div></div>
    <div class="sum-card hecho"><div class="sum-label">Hecho</div><div class="sum-value" id="cnt-hecho">0</div></div>
  </div>

  <div class="pending-section">
    <div class="section-title">Requieren atención</div>
    <div class="pending-list" id="pending-list"></div>
  </div>

  <div class="section-title">Detalle por sistema y oleada</div>
  <div id="sistemas-container"></div>
  <button class="add-sistema-btn" id="add-sistema-btn">+ Añadir sistema</button>
</div>

<div id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ── REEMPLAZA ESTO CON TU CONFIG DE FIREBASE ──────────────────────────────
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROJECT_ID.firebaseapp.com",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_PROJECT_ID.appspot.com",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};
// ──────────────────────────────────────────────────────────────────────────

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const STATUS_ORDER = ['tercero', 'en-curso', 'bloqueado', 'hecho'];

function statusLabel(s) {
  return { tercero: 'Esperando tercero', 'en-curso': 'En curso', hecho: 'Hecho', bloqueado: 'Bloqueado' }[s] || s;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Query params ───────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const PROJECT_ID = params.get('id');
if (!PROJECT_ID) { location.href = 'index.html'; }

// ── Saving indicator ───────────────────────────────────────────────────────
let savingCount = 0;
function startSaving() {
  savingCount++;
  document.getElementById('saving-indicator').classList.add('visible');
}
function doneSaving() {
  if (--savingCount <= 0) {
    savingCount = 0;
    document.getElementById('saving-indicator').classList.remove('visible');
    document.getElementById('last-updated').textContent =
      'Guardado ' + new Date().toLocaleString('es-ES', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  }
}

// ── Toast ──────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 4000);
}

// ── In-memory state (rebuilt from onSnapshot) ──────────────────────────────
// state = { projectName, sistemas: [{ id, name, order, open, oleadas: [{ id, name, order, open, tasks: [{ id, ...fields }] }] }] }
let state = { projectName: '', sistemas: [] };
let projectRef;
let unsubListeners = [];

// ── Auth guard ─────────────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  if (!user) { location.href = 'index.html'; return; }
  initProject(user);
});

async function initProject(user) {
  projectRef = db.collection('projects').doc(PROJECT_ID);
  const snap = await projectRef.get();
  if (!snap.exists || snap.data().ownerUid !== user.uid) {
    location.href = 'index.html'; return;
  }
  state.projectName = snap.data().name;
  document.getElementById('project-name').textContent = state.projectName;
  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('main-layout').style.display = 'block';
  subscribeToSistemas();
}

// ── Real-time listener ─────────────────────────────────────────────────────
function subscribeToSistemas() {
  const unsub = projectRef.collection('sistemas').orderBy('order').onSnapshot(async snap => {
    // Rebuild sistemas array
    const newSistemas = [];
    for (const doc of snap.docs) {
      const d = doc.data();
      const existing = state.sistemas.find(s => s.id === doc.id);
      newSistemas.push({
        id: doc.id,
        name: d.name,
        order: d.order,
        open: d.open,
        oleadas: existing ? existing.oleadas : []
      });
    }
    state.sistemas = newSistemas;

    // Subscribe oleadas for each sistema
    unsubListeners.forEach(u => u());
    unsubListeners = [];
    for (const sist of state.sistemas) {
      const u = projectRef.collection('sistemas').doc(sist.id)
        .collection('oleadas').orderBy('order')
        .onSnapshot(async oleaSnap => {
          const newOleadas = [];
          for (const oleaDoc of oleaSnap.docs) {
            const od = oleaDoc.data();
            const existingO = sist.oleadas.find(o => o.id === oleaDoc.id);
            newOleadas.push({
              id: oleaDoc.id,
              name: od.name,
              order: od.order,
              open: od.open,
              tasks: existingO ? existingO.tasks : []
            });
          }
          sist.oleadas = newOleadas;

          // Subscribe tasks for each oleada
          for (const olea of sist.oleadas) {
            const tu = projectRef.collection('sistemas').doc(sist.id)
              .collection('oleadas').doc(olea.id)
              .collection('tasks').orderBy('order')
              .onSnapshot(taskSnap => {
                olea.tasks = taskSnap.docs.map(td => ({ id: td.id, ...td.data() }));
                renderAll();
              }, err => showToast('Error cargando tareas: ' + err.message, true));
            unsubListeners.push(tu);
          }
          renderAll();
        }, err => showToast('Error cargando oleadas: ' + err.message, true));
      unsubListeners.push(u);
    }
    renderAll();
  }, err => showToast('Error cargando sistemas: ' + err.message, true));
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderAll() {
  const allTasks = state.sistemas.flatMap(s => s.oleadas.flatMap(o => o.tasks));

  // Counts
  ['tercero','en-curso','bloqueado','hecho'].forEach(st => {
    document.getElementById('cnt-' + st).textContent = allTasks.filter(t => t.status === st).length;
  });

  // Pending list
  const pendingList = document.getElementById('pending-list');
  const attention = allTasks.filter(t => t.status !== 'hecho');
  if (attention.length === 0) {
    pendingList.innerHTML = '<div style="font-size:13px;color:var(--text-tertiary);font-style:italic;padding:.5rem 0">Todo al día ✓</div>';
  } else {
    pendingList.innerHTML = attention.map(t => {
      const sist = state.sistemas.find(s => s.oleadas.some(o => o.tasks.some(x => x.id === t.id)));
      const olea = sist?.oleadas.find(o => o.tasks.some(x => x.id === t.id));
      return `<div class="pending-item">
        <button class="status ${t.status}" onclick="cyclePendingStatus('${escHtml(sist.id)}','${escHtml(olea.id)}','${t.id}')">${statusLabel(t.status)}</button>
        <span class="pi-desc">${escHtml(t.desc)}${t.ticket ? ' <span style="font-family:var(--mono);font-size:11px;color:var(--text-tertiary)">#'+escHtml(t.ticket)+'</span>' : ''}</span>
        <span class="pi-wave">${escHtml(olea?.name||'')} · ${escHtml(sist?.name||'')}</span>
        ${t.person ? '<span class="pi-person">↳ ' + escHtml(t.person) + '</span>' : ''}
      </div>`;
    }).join('');
  }

  // Sistemas
  const container = document.getElementById('sistemas-container');
  container.innerHTML = state.sistemas.map(s => {
    const allS = s.oleadas.flatMap(o => o.tasks);
    const openTasks = allS.filter(t => t.status !== 'hecho').length;
    const oleadasHtml = s.oleadas.map(o => {
      const counts = { tercero: 0, 'en-curso': 0, bloqueado: 0, hecho: 0 };
      o.tasks.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });
      const statsHtml = Object.entries(counts).filter(([,v]) => v > 0)
        .map(([k,v]) => `<span class="status ${k}" style="font-size:10px">${v} ${statusLabel(k)}</span>`).join('');
      const tasksHtml = o.tasks.length === 0
        ? '<div class="empty-wave">Sin tareas aún</div>'
        : o.tasks.map(t => `
          <div class="task-row">
            <div class="task-main">
              <span class="task-desc ${t.status === 'hecho' ? 'hecho' : ''}">${escHtml(t.desc)}</span>
              ${t.ticket ? '<span class="task-ticket">#' + escHtml(t.ticket) + '</span>' : ''}
              ${t.note ? '<span class="task-note">' + escHtml(t.note) + '</span>' : ''}
              <div class="task-meta">
                ${t.person ? '<span class="task-person">↳ ' + escHtml(t.person) + '</span>' : ''}
              </div>
            </div>
            <div class="task-right">
              <button class="status ${t.status}" onclick="cycleStatus('${escHtml(s.id)}','${escHtml(o.id)}','${t.id}')" title="Haz clic para cambiar estado">${statusLabel(t.status)}</button>
              <button class="del-btn" onclick="deleteTask('${escHtml(s.id)}','${escHtml(o.id)}','${t.id}')" title="Eliminar">×</button>
            </div>
          </div>`).join('');
      return `
        <div class="wave-block">
          <div class="wave-header" onclick="toggleOleada('${escHtml(s.id)}','${escHtml(o.id)}')">
            <span class="wave-label">${escHtml(o.name)}</span>
            <div class="wave-stats">${statsHtml}</div>
            <span class="wave-toggle">${o.open ? '▲' : '▼'}</span>
          </div>
          <div class="wave-body ${o.open ? 'open' : ''}" id="tasks-${s.id}-${o.id}">
            ${tasksHtml}
            <button class="add-task-btn" onclick="showAddTask('${escHtml(s.id)}','${escHtml(o.id)}')">+ Añadir tarea</button>
          </div>
        </div>`;
    }).join('');
    return `
      <div class="sistema-block">
        <div class="sistema-header" onclick="toggleSistema('${escHtml(s.id)}')">
          <span class="sistema-name">${escHtml(s.name)}</span>
          <span class="sistema-count">${openTasks} abiertas / ${allS.length} total</span>
          <span class="sistema-toggle ${s.open ? 'open' : ''}">▼</span>
        </div>
        ${s.open ? `<div id="oleadas-${s.id}">${oleadasHtml}<button class="add-wave-btn" onclick="showAddOleada('${escHtml(s.id)}')">+ Añadir oleada</button></div>` : ''}
      </div>`;
  }).join('');
}

// ── Actions ────────────────────────────────────────────────────────────────
async function writeDoc(ref, data, merge = false) {
  startSaving();
  try {
    if (merge) await ref.set(data, { merge: true });
    else await ref.update(data);
    doneSaving();
  } catch(e) {
    doneSaving();
    showToast('Error al guardar: ' + e.message, true);
  }
}

function taskRef(sistId, oleaId, taskId) {
  return projectRef.collection('sistemas').doc(sistId).collection('oleadas').doc(oleaId).collection('tasks').doc(taskId);
}

function cycleStatus(sistId, oleaId, taskId) {
  const sist = state.sistemas.find(s => s.id === sistId);
  const olea = sist.oleadas.find(o => o.id === oleaId);
  const task = olea.tasks.find(t => t.id === taskId);
  const next = STATUS_ORDER[(STATUS_ORDER.indexOf(task.status) + 1) % STATUS_ORDER.length];
  writeDoc(taskRef(sistId, oleaId, taskId), { status: next });
}

function cyclePendingStatus(sistId, oleaId, taskId) {
  cycleStatus(sistId, oleaId, taskId);
}

function deleteTask(sistId, oleaId, taskId) {
  if (!confirm('¿Eliminar esta tarea?')) return;
  startSaving();
  taskRef(sistId, oleaId, taskId).delete().then(doneSaving).catch(e => { doneSaving(); showToast('Error: ' + e.message, true); });
}

function toggleOleada(sistId, oleaId) {
  const sist = state.sistemas.find(s => s.id === sistId);
  const olea = sist.oleadas.find(o => o.id === oleaId);
  writeDoc(projectRef.collection('sistemas').doc(sistId).collection('oleadas').doc(oleaId), { open: !olea.open });
}

function toggleSistema(sistId) {
  const sist = state.sistemas.find(s => s.id === sistId);
  writeDoc(projectRef.collection('sistemas').doc(sistId), { open: !sist.open });
}

// ── Add task ───────────────────────────────────────────────────────────────
function showAddTask(sistId, oleaId) {
  const formId = 'form-' + sistId + '-' + oleaId;
  const existing = document.getElementById(formId);
  if (existing) { existing.remove(); return; }
  const container = document.getElementById('tasks-' + sistId + '-' + oleaId);
  if (!container) return;
  const form = document.createElement('div');
  form.className = 'inline-form'; form.id = formId;
  form.innerHTML = `
    <div class="form-row">
      <input class="f-desc" placeholder="Descripción de la tarea" id="fd-desc-${formId}">
      <input class="f-ticket" placeholder="Ticket / ID" id="fd-ticket-${formId}">
    </div>
    <div class="form-row">
      <input class="f-person" placeholder="Persona asignada" id="fd-person-${formId}">
      <select class="f-status" id="fd-status-${formId}">
        <option value="tercero">Esperando tercero</option>
        <option value="en-curso" selected>En curso</option>
        <option value="bloqueado">Bloqueado</option>
        <option value="hecho">Hecho</option>
      </select>
    </div>
    <div class="form-row">
      <textarea class="f-note" placeholder="Nota o contexto (opcional)" id="fd-note-${formId}"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveTask('${sistId}','${oleaId}','${formId}')">Guardar</button>
      <button class="btn-cancel" onclick="document.getElementById('${formId}').remove()">Cancelar</button>
    </div>`;
  container.appendChild(form);
  document.getElementById('fd-desc-' + formId).focus();
}

async function saveTask(sistId, oleaId, formId) {
  const desc = document.getElementById('fd-desc-' + formId)?.value.trim();
  if (!desc) return;
  const sist = state.sistemas.find(s => s.id === sistId);
  const olea = sist?.oleadas.find(o => o.id === oleaId);
  const maxOrder = olea ? Math.max(-1, ...olea.tasks.map(t => t.order ?? 0)) : 0;
  startSaving();
  try {
    await projectRef.collection('sistemas').doc(sistId).collection('oleadas').doc(oleaId).collection('tasks').add({
      desc,
      ticket: document.getElementById('fd-ticket-' + formId)?.value.trim() || '',
      person: document.getElementById('fd-person-' + formId)?.value.trim() || '',
      status: document.getElementById('fd-status-' + formId)?.value || 'en-curso',
      note: document.getElementById('fd-note-' + formId)?.value.trim() || '',
      order: maxOrder + 1,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    doneSaving();
    document.getElementById(formId)?.remove();
  } catch(e) {
    doneSaving();
    showToast('Error al guardar tarea: ' + e.message, true);
  }
}

// ── Add oleada ─────────────────────────────────────────────────────────────
function showAddOleada(sistId) {
  const formId = 'wform-' + sistId;
  const existing = document.getElementById(formId);
  if (existing) { existing.remove(); return; }
  const container = document.getElementById('oleadas-' + sistId);
  if (!container) return;
  const form = document.createElement('div');
  form.className = 'wave-inline-form'; form.id = formId;
  form.innerHTML = `
    <input placeholder="Nombre de la oleada (ej: Oleada 10)" id="wf-name-${formId}" style="flex:1;min-width:160px">
    <button class="btn-save" onclick="saveOleada('${sistId}','${formId}')">Añadir</button>
    <button class="btn-cancel" onclick="document.getElementById('${formId}').remove()">✕</button>`;
  const addBtn = container.querySelector('.add-wave-btn');
  container.insertBefore(form, addBtn);
  document.getElementById('wf-name-' + formId).focus();
}

async function saveOleada(sistId, formId) {
  const name = document.getElementById('wf-name-' + formId)?.value.trim();
  if (!name) return;
  const sist = state.sistemas.find(s => s.id === sistId);
  const maxOrder = sist ? Math.max(-1, ...sist.oleadas.map(o => o.order ?? 0)) : 0;
  startSaving();
  try {
    await projectRef.collection('sistemas').doc(sistId).collection('oleadas').add({
      name, order: maxOrder + 1, open: true
    });
    doneSaving();
    document.getElementById(formId)?.remove();
  } catch(e) {
    doneSaving();
    showToast('Error al crear oleada: ' + e.message, true);
  }
}

// ── Add sistema ────────────────────────────────────────────────────────────
document.getElementById('add-sistema-btn').addEventListener('click', async () => {
  const name = prompt('Nombre del sistema:');
  if (!name?.trim()) return;
  const maxOrder = Math.max(-1, ...state.sistemas.map(s => s.order ?? 0));
  startSaving();
  try {
    await projectRef.collection('sistemas').add({ name: name.trim(), order: maxOrder + 1, open: true });
    doneSaving();
  } catch(e) {
    doneSaving();
    showToast('Error al crear sistema: ' + e.message, true);
  }
});

// ── Edit project name ──────────────────────────────────────────────────────
document.getElementById('project-name').addEventListener('click', () => {
  const el = document.getElementById('project-name');
  const current = state.projectName;
  const input = document.createElement('input');
  input.value = current;
  input.style.cssText = 'font-size:22px;font-weight:600;letter-spacing:-.02em;border:1px solid #2D5BE3;border-radius:4px;padding:2px 6px;font-family:inherit;color:inherit;background:#fff;';
  el.replaceWith(input);
  input.focus(); input.select();
  async function finish() {
    const newName = input.value.trim() || current;
    state.projectName = newName;
    const restored = document.createElement('div');
    restored.id = 'project-name'; restored.className = 'project-name'; restored.title = 'Haz clic para editar';
    restored.textContent = newName;
    input.replaceWith(restored);
    restored.addEventListener('click', arguments.callee);
    if (newName !== current) {
      startSaving();
      try { await projectRef.update({ name: newName }); doneSaving(); }
      catch(e) { doneSaving(); showToast('Error: ' + e.message, true); }
    }
  }
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') finish(); if (e.key === 'Escape') { input.value = current; finish(); } });
});

// ── Back button ────────────────────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', () => {
  location.href = 'index.html';
});
</script>
